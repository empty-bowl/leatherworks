<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        :root { 
            --brown: #5D4037; 
            /* Deeper "pool table" felt green */
            --felt-green: #3E6349; 
        }
        body {
          /* Deep pool table green base color */
          background-color: #3E6349;
    
           /* Overlaying a noise pattern to simulate felt fibers */
           background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.1) 100%), 
                      repeating-radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0.02) 1px, transparent 2px);
           background-size: 100% 100%, 4px 4px;
}
        .container { 
            width: 100%; 
            max-width: 700px; 
            display: grid; 
            gap: 15px; 
        }
        /* Digital frame effect: sharp borders with slight drop-shadow */
        .box { 
            border: 2px solid var(--brown); 
            background: white; 
            padding: 15px; 
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }
        .nav { font-weight: bold; text-align: center; }
        .hero { display: flex; gap: 15px; }
        .hero-img { width: 30%; background: #eee; border: 1px solid #ccc; }
        .hero-text { width: 70%; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        h1, h2, h3 { margin: 0; color: var(--brown); text-transform: uppercase; }
        button { 
            background: var(--brown); 
            color: white; 
            border: none; 
            padding: 8px 16px; 
            cursor: pointer; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box nav">OUR CRAFT | GALLERY | SHOP | CONTACT</div>
        
        <div class="hero box">
            <div class="hero-img"></div>
            <div class="hero-text">
                <h1>LEATHERWORKS</h1>
                <p>HANDCRAFTED | VEG-TANNED | TIMELESS DESIGN</p>
                <p>SMALL ACCESSORIES. SMALL BATCH.</p>
            </div>
        </div>

        <div class="grid-3">
            <div class="box"><h3>PROCESS</h3></div>
            <div class="box"><h3>WALLET</h3></div>
            <div class="box"><h3>BELT</h3></div>
        </div>

        <div class="box" style="text-align: center;">
            <h2>START YOUR COLLECTION</h2>
            <button>SHOP NOW</button>
        </div>
    </div>
</body>
</html>
