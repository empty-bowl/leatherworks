<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leatherworks Storefront</title>
    <style>
        :root { --brown: #5D4037; --mint: #E8F5E9; }
        body { background-color: var(--mint); font-family: sans-serif; margin: 0; padding: 20px; }
        .module { border: 4px solid var(--brown); background: white; padding: 25px; margin: 15px auto; max-width: 600px; border-radius: 10px; color: var(--brown); }
        h1 { text-align: center; }
        .product-grid { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
.product-card { border: 2px solid var(--brown); padding: 15px; border-radius: 8px; width: 200px; text-align: center; background: white; }
    </style>
</head>
<!-- Product Grid -->
<div class="product-grid">
    <div class="product-card">
        <h3>Leather Wallet</h3>
        <p>$45.00</p>
    </div>
    <div class="product-card">
        <h3>Leather Belt</h3>
        <p>$65.00</p>
    </div>
</div>
<body>
    <div class="module">
        <h1>Leatherworks</h1>
        <p>Handcrafted, vegetable-tanned leather goods.</p>
    </div>
</body>
</html>
