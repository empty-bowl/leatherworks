<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leatherworks Storefront</title>
    <style>
        :root { --brown: #5D4037; --mint: #E8F5E9; }

        <h1>Leatherworks</h1>

</html>
