<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>James Looney's Leatherworks</title>
    <style>
        :root { 
            --brown: #5D4037; 
            --mint: #C8E6C9;
        }
        body { 
            /* Grid with dashed effect on mint green */
            background-color: var(--mint);
            background-image: 
                repeating-linear-gradient(to right, transparent 0, transparent 4px, rgba(93, 64, 55, 0.2) 4px, rgba(93, 64, 55, 0.2) 6px, transparent 6px, transparent 10px), 
                repeating-linear-gradient(to bottom, transparent 0, transparent 4px, rgba(93, 64, 55, 0.2) 4px, rgba(93, 64, 55, 0.2) 6px, transparent 6px, transparent 10px);
            background-size: 20px 20px;
            
            font-family: sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container { 
            width: 100%; 
            max-width: 400px; 
            display: grid; 
            gap: 15px; 
        }

        .header-slant {
            background-color: var(--brown);
            color: white;
            padding: 15px 20px;
            font-weight: bold;
            text-transform: uppercase;
            width: 50%; 
            clip-path: polygon(0% 0%, 85% 0%, 100% 100%, 0% 100%);
            margin-bottom: -10px;
            font-size: 0.9em;
            position: relative;
        }

        .header-slant::after {
            content: "";
            position: absolute;
            right: 25%;
            top: 25%;
            height: 50%;
            width: 2px;
            background: white;
            box-shadow: 6px 0 0 white;
        }

        .box { 
            border: 2px solid var(--brown); 
            background: white; 
            padding: 25px 20px; 
            text-align: center;
        }
        
        .nav { font-weight: bold; font-size: 0.9em; }
        .hero { display: flex; flex-direction: column; gap: 15px; text-align: center; }
        .hero-img { width: 100px; height: 100px; background: #eee; border: 1px solid #ccc; margin: 0 auto; }
        .hero-text { font-size: 0.9em; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        
        button { 
            background: var(--brown); 
            color: white; 
            border: none; 
            padding: 15px; 
            cursor: pointer; 
            text-transform: uppercase;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-slant">James Looney's Leatherworks</div>
        
        <div class="box nav">OUR CRAFT | GALLERY | SHOP | CONTACT</div>
        
        <div class="hero box">
            <div class="hero-img"></div>
            <div class="hero-text">
                <h2>LEATHERWORKS</h2>
                <p>HANDCRAFTED | VEG-TANNED | RESTORATION | SMALL GOODS | COMMISSIONS</p>
            </div>
        </div>
        
        <div class="grid-3">
            <div class="box">PROCESS</div>
            <div class="box">WALLET</div>
            <div class="box">BELT</div>
        </div>
        
        <div class="box">
            <button>SHOP NOW</button>
        </div>
    </div>
</body>
</html>
