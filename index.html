<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leatherworks</title>
    <style>
        :root { 
            --brown: #5D4037; 
            --mint: #C8E6C9;
        }
        body { 
            background-color: var(--mint); 
            font-family: sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container { 
            width: 100%; 
            max-width: 600px; 
            display: grid; 
            gap: 10px; 
        }
        .box { 
            border: 2px solid var(--brown); 
            background: white; 
            padding: 15px;
            text-align: center;
        }
        .nav { font-weight: bold; }
        .hero { display: flex; gap: 10px; text-align: left; }
        .hero-img { width: 30%; background: #eee; border: 1px solid #ccc; }
        .hero-text { width: 70%; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        button { background: var(--brown); color: white; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="box nav">OUR CRAFT | GALLERY | SHOP | CONTACT</div>
        <div class="hero box">
            <div class="hero-img"></div>
            <div class="hero-text">
                <h2>LEATHERWORKS</h2>
                <p>HANDCRAFTED | VEG-TANNED</p>
            </div>
        </div>
        <div class="grid-3">
            <div class="box">PROCESS</div>
            <div class="box">WALLET</div>
            <div class="box">BELT</div>
        </div>
        <div class="box">
            <button>SHOP NOW</button>
        </div>
    </div>
</body>
</html>
