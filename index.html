<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leatherworks Storefront</title>
    <style>
        :root { 
            --brown: #5D4037; 
            --bg-felt: #C8E6C9; /* Reference image background color */
        }
        body { 
            background-color: var(--bg-felt); 
            font-family: 'Helvetica', sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 40px; 
            margin: 0;
        }
        .container { 
            width: 100%; 
            max-width: 800px; 
            display: grid; 
            gap: 20px; 
        }
        .box { 
            border: 2px solid var(--brown); 
            background: white; 
            padding: 20px; 
        }
        .nav { text-align: center; font-weight: bold; }
        .hero { display: flex; gap: 20px; }
        .hero-img { width: 40%; background: #eee; border: 1px solid #ccc; }
        .hero-text { width: 60%; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        h1 { margin-top: 0; color: var(--brown); }
        .box { 
    border: 2px solid var(--brown); 
    background: white; 
    padding: 20px; 
    text-align: center; /* Ensures content in boxes is centered */
}

/* Style the shop button */
button { 
    background-color: var(--brown); 
    color: white; 
    border: none; 
    padding: 10px 20px; 
    cursor: pointer; 
    font-weight: bold;
    text-transform: uppercase;
}

/* Adjust the hero text alignment */
.hero-text { 
    width: 60%; 
    text-align: left; 
}
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <div class="box nav">OUR CRAFT | GALLERY | SHOP | CONTACT</div>
        
        <!-- Hero Section -->
        <div class="hero box">
            <div class="hero-img"></div>
            <div class="hero-text">
                <h1>LEATHERWORKS</h1>
                <p>HANDCRAFTED | VEG-TANNED | TIMELESS DESIGN</p>
                <p>SMALL ACCESSORIES. SMALL BATCH.</p>
            </div>
        </div>

        <!-- Product Grid -->
        <div class="grid-3">
            <div class="box"><h3>OUR PROCESS</h3></div>
            <div class="box"><h3>FEATURED WALLET</h3></div>
            <div class="box"><h3>FEATURED BELT</h3></div>
        </div>

        <!-- Footer -->
        <div class="box">
            <h2>START YOUR COLLECTION</h2>
            <button>SHOP NOW</button>
        </div>
    </div>
</body>
</html>
