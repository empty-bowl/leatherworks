<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>James Looney's Leatherworks</title>
    <style>
        :root { 
            --brown: #5D4037; 
            --mint: #C8E6C9;
        }
        body { 
            /* Removed min-height to allow content to dictate height */
            background-color: var(--mint);
            background-image: 
                repeating-linear-gradient(to right, transparent 0, transparent 1.66px, var(--mint) 1.66px, var(--mint) 5px, transparent 5px, transparent 6.66px), 
                repeating-linear-gradient(to bottom, transparent 0, transparent 1.66px, var(--mint) 1.66px, var(--mint) 5px, transparent 5px, transparent 6.66px), 
                linear-gradient(to bottom, rgba(93, 64, 55, 0.3) 0.6px, transparent 0.6px), 
                linear-gradient(to right, rgba(93, 64, 55, 0.3) 0.6px, transparent 0.6px);
            background-size: 20px 20px, 20px 20px, 20px 20px, 20px 20px;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        /* Container forces rigid sizing */
        .container { 
            width: 100%; 
            max-width: 400px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }

        .header-slant {
            background-color: var(--brown);
            color: white;
            padding: 10px 15px;
            font-weight: bold;
            text-transform: uppercase;
            width: 50%; 
            clip-path: polygon(0% 0%, 85% 0%, 100% 100%, 0% 100%);
            margin-bottom: -5px;
            font-size: 0.85em;
            position: relative;
        }

        .header-slant::after {
            content: "";
            position: absolute;
            right: 25%;
            top: 25%;
            height: 50%;
            width: 2px;
            background: white;
            box-shadow: 6px 0 0 white;
        }

        .box { border: 2px solid var(--brown); background: white; padding: 15px; text-align: center; }
        .nav { font-weight: bold; font-size: 0.8em; padding: 10px; }
        .hero { display: flex; flex-direction: column; gap: 10px; padding: 15px; }
        .hero-img { width: 80px; height: 80px; background: #eee; border: 1px solid #ccc; margin: 0 auto; }
        .hero-text h2 { margin: 5px 0; font-size: 1.1em; }
        .hero-text p { font-size: 0.7em; margin: 0; }
        
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        
        button { 
            background: var(--brown); color: white; border: none; padding: 10px; 
            cursor: pointer; text-transform: uppercase; font-weight: bold; width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-slant">James Looney's Leatherworks</div>
        <div class="box nav">OUR CRAFT | GALLERY | SHOP | CONTACT</div>
        <div class="hero box">
            <div class="hero-img"></div>
            <div class="hero-text">
                <h2>LEATHERWORKS</h2>
                <p>HANDCRAFTED | VEG-TANNED | RESTORATION | SMALL GOODS | COMMISSIONS</p>
            </div>
        </div>
        <div class="grid-3">
            <div class="box">PROCESS</div>
            <div class="box">WALLET</div>
            <div class="box">BELT</div>
        </div>
        <div class="box">
            <button>SHOP NOW</button>
        </div>
    </div>
</body>
</html>
