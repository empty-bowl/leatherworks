<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leatherworks</title>
    <style>
        :root { 
            --brown: #5D4037; 
            --off-white: #F8F5F0;
        }
        
        body { 
            /* Clean paisley pattern: White/Brown theme */
            background-color: var(--off-white);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M50 0 C40 10, 40 30, 50 40 C60 50, 40 70, 50 80 C60 90, 80 70, 70 60 C60 50, 60 30, 70 20 C80 10, 60 0, 50 0 Z" fill="%235D4037" fill-opacity="0.1"/></svg>');
            background-size: 80px 80px;
            
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 40px 20px; 
            margin: 0;
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 700px; 
            display: grid; 
            gap: 15px; 
        }

        /* Digital Frame Styling */
        .box { 
            border: 2px solid var(--brown); 
            background: white; 
            padding: 15px; 
            box-shadow: 4px 4px 0px rgba(93, 64, 55, 0.15);
            text-align: center;
        }

        .nav { font-weight: bold; }
        .hero { display: flex; gap: 15px; text-align: left; }
        .hero-img { width: 30%; background: #eee; border: 1px solid #ccc; }
        .hero-text { width: 70%; }
        
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        
        h1, h2, h3 { margin: 0; color: var(--brown); text-transform: uppercase; }
        
        button { 
            background: var(--brown); 
            color: white; 
            border: none; 
            padding: 8px 16px; 
            cursor: pointer; 
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box nav">OUR CRAFT | GALLERY | SHOP | CONTACT</div>
        
        <div class="hero box">
            <div class="hero-img"></div>
            <div class="hero-text">
                <h1>LEATHERWORKS</h1>
                <p>HANDCRAFTED | VEG-TANNED | TIMELESS DESIGN</p>
                <p>SMALL ACCESSORIES. SMALL BATCH.</p>
            </div>
        </div>

        <div class="grid-3">
            <div class="box"><h3>PROCESS</h3></div>
            <div class="box"><h3>WALLET</h3></div>
            <div class="box"><h3>BELT</h3></div>
        </div>

        <div class="box">
            <h2>START YOUR COLLECTION</h2>
            <button>SHOP NOW</button>
        </div>
    </div>
</body>
</html>
